<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond carre (sera rogne en arrondi par Android adaptive icon) -->
  <rect width="1024" height="1024" rx="180" ry="180" fill="url(#bg)"/>

  <!-- Texte GS, en blanc, font sans-serif tres bold, centre -->
  <text x="512" y="512"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="'Poppins', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="500"
        letter-spacing="-20"
        fill="#FFFFFF"
        filter="url(#shadow)">GS</text>
</svg>
